server.port=55102

spring.cloud.azure.keyvault.secret.property-sources[0].endpoint=https://codealchemistvault.vault.azure.net/

spring.datasource.url=jdbc:mysql://your-server.mysql.database.azure.com:3306/bookservice?sslMode=REQUIRED&serverTimezone=UTC
spring.datasource.username=your-username
spring.datasource.password=your-password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate - 'update' cria as tabelas automaticamente se não existirem
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Azure Event Hub Configuration
spring.kafka.bootstrap-servers=your-event-hub.servicebus.windows.net:9093
spring.kafka.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="$ConnectionString" password=your-password
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.ssl.trust-store-type=JKS


